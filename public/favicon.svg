<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0e17" />
      <stop offset="100%" stop-color="#161527" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4655" />
      <stop offset="100%" stop-color="#ff7eb3" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Card / Canvas -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="rgba(255, 70, 85, 0.15)" stroke-width="8" />

  <!-- Stylized Geometric Logo Symbol (JA monogram / Tech Icon) -->
  <g transform="translate(64, 64)" filter="url(#glow)">
    <!-- Hexagonal outer path -->
    <polygon points="192,24 336,108 336,276 192,360 48,276 48,108" fill="none" stroke="url(#accentGrad)" stroke-width="18" stroke-linejoin="round" stroke-linecap="round" />
    
    <!-- Inside details (J & A stylized paths) -->
    <!-- Stylized 'J' curve on the left/bottom -->
    <path d="M140 120 V250 A 40 40 0 0 1 100 290 H 95" fill="none" stroke="url(#accentGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Stylized 'A' shape on the right -->
    <path d="M200 290 V140 A 30 30 0 0 1 260 140 V290" fill="none" stroke="url(#accentGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M200 220 H260" fill="none" stroke="url(#accentGrad)" stroke-width="20" stroke-linecap="round" />

    <!-- Center tech/node connector dots -->
    <circle cx="192" cy="192" r="16" fill="#fffffe" />
  </g>
</svg>